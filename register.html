<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account — InternHub</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="auth-page" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    
    <!-- Decorative background orbs -->
    <div style="position: fixed; top: 15%; right: 20%; width: 350px; height: 350px; background: radial-gradient(circle, rgba(52,211,153,0.08) 0%, transparent 65%); z-index: 0; pointer-events: none; animation: orbFloat 18s ease-in-out infinite alternate;"></div>
    <div style="position: fixed; bottom: 15%; left: 12%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 65%); z-index: 0; pointer-events: none; animation: orbFloat 22s ease-in-out infinite alternate-reverse;"></div>

    <div class="glass-card animate-fade auth-card" style="width: 100%; max-width: 440px; padding: 36px; z-index: 1; border-radius: var(--radius-lg);">
      <!-- Brand logo -->
      <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 28px; cursor: pointer;" onclick="window.location.href='/'">
        <span style="width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #818cf8 0%, #6366f1 50%, #4f46e5 100%); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; font-size: 1.15rem; box-shadow: 0 4px 16px rgba(99,102,241,0.3);">I</span>
        <span style="font-weight: 800; font-size: 1.45rem; letter-spacing: -0.03em;">InternHub</span>
      </div>

      <h2 style="text-align: center; font-size: 1.5rem; margin-bottom: 8px; font-weight: 800;">Create your account</h2>
      <p style="text-align: center; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 28px;">Start hiring or getting hired today.</p>

      <div id="error-box" style="background: var(--error-glow); border: 1px solid rgba(248, 113, 113, 0.2); padding: 12px; border-radius: 10px; color: var(--error); font-size: 0.8rem; margin-bottom: 18px; text-align: center; display: none;"></div>

      <form id="register-form" style="display: flex; flex-direction: column; gap: 18px;">
        <div class="form-group">
          <label class="label">Full Name</label>
          <input type="text" id="name" class="input" placeholder="Nisha Sharma" required />
        </div>
        <div class="form-group">
          <label class="label">Email Address</label>
          <input type="email" id="email" class="input" placeholder="name@company.com" required />
        </div>
        <div class="form-group">
          <label class="label">Password</label>
          <input type="password" id="password" class="input" placeholder="••••••••" required />
        </div>
        <div class="form-group">
          <label class="label">I am a...</label>
          <select id="role" class="select" required>
            <option value="student">🎓 Student looking for Internships</option>
            <option value="recruiter">💼 Recruiter seeking Talent</option>
          </select>
        </div>
        
        <button class="btn btn-primary" type="submit" id="submit-btn" style="margin-top: 6px; padding: 12px 0; font-size: 0.9rem;">Create Account &rarr;</button>
      </form>

      <!-- Trust badges -->
      <div style="display: flex; justify-content: center; gap: 16px; margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--border-glass);">
        <span style="font-size: 0.65rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px;">
          <span style="color: var(--accent);">🔒</span> SOC2 Secured
        </span>
        <span style="font-size: 0.65rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px;">
          <span style="color: var(--accent);">✓</span> HIPAA Compliant
        </span>
        <span style="font-size: 0.65rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px;">
          <span style="color: var(--accent);">⚡</span> Instant Setup
        </span>
      </div>

      <div style="margin-top: 20px; text-align: center; font-size: 0.85rem; color: var(--text-secondary);">
        Already have an account? <a href="/login.html" style="color: var(--primary); font-weight: 600;">Log in</a>
      </div>
    </div>

    <!-- Script to handle registration -->
    <script>
      const form = document.getElementById('register-form');
      const errBox = document.getElementById('error-box');
      const submitBtn = document.getElementById('submit-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errBox.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span style="display:inline-block; animation: spin 0.6s linear infinite; font-size: 1rem;">⟳</span> Creating Account...';

        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const role = document.getElementById('role').value;

        try {
          const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password, role })
          });

          const data = await res.json();
          if (data.success) {
            // Save state
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            // Success transition
            submitBtn.innerHTML = '✓ Account Created';
            submitBtn.style.background = 'var(--accent)';
            setTimeout(() => { window.location.href = '/dashboard.html'; }, 500);
          } else {
            errBox.innerText = data.message || 'Registration failed.';
            errBox.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Create Account &rarr;';
          }
        } catch (err) {
          console.error(err);
          errBox.innerText = 'Failed to connect to authentication server.';
          errBox.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Create Account &rarr;';
        }
      });
    </script>

    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </body>
</html>
