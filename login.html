<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In — InternHub</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="auth-page" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    
    <!-- Decorative background orbs -->
    <div style="position: fixed; top: 20%; left: 15%; width: 350px; height: 350px; background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 65%); z-index: 0; pointer-events: none; animation: orbFloat 15s ease-in-out infinite alternate;"></div>
    <div style="position: fixed; bottom: 10%; right: 10%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(52,211,153,0.06) 0%, transparent 65%); z-index: 0; pointer-events: none; animation: orbFloat 20s ease-in-out infinite alternate-reverse;"></div>

    <div class="glass-card animate-fade auth-card" style="width: 100%; max-width: 420px; padding: 36px; z-index: 1; border-radius: var(--radius-lg);">
      <!-- Brand logo -->
      <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 28px; cursor: pointer;" onclick="window.location.href='/'">
        <span style="width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #818cf8 0%, #6366f1 50%, #4f46e5 100%); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; font-size: 1.15rem; box-shadow: 0 4px 16px rgba(99,102,241,0.3);">I</span>
        <span style="font-weight: 800; font-size: 1.45rem; letter-spacing: -0.03em;">InternHub</span>
      </div>

      <h2 style="text-align: center; font-size: 1.5rem; margin-bottom: 8px; font-weight: 800;">Welcome back</h2>
      <p style="text-align: center; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 28px;">Enter your credentials to access your dashboard.</p>

      <div id="error-box" style="background: var(--error-glow); border: 1px solid rgba(248, 113, 113, 0.2); padding: 12px; border-radius: 10px; color: var(--error); font-size: 0.8rem; margin-bottom: 18px; text-align: center; display: none;"></div>

      <form id="login-form" style="display: flex; flex-direction: column; gap: 18px;">
        <div class="form-group">
          <label class="label">Email Address</label>
          <input type="email" id="email" class="input" placeholder="name@company.com" required />
        </div>
        <div class="form-group">
          <label class="label">Password</label>
          <input type="password" id="password" class="input" placeholder="••••••••" required />
        </div>
        
        <button class="btn btn-primary" type="submit" id="submit-btn" style="margin-top: 6px; padding: 12px 0; font-size: 0.9rem;">Sign In &rarr;</button>
      </form>

      <!-- Separator -->
      <div style="display: flex; align-items: center; gap: 12px; margin: 24px 0 20px;">
        <div style="flex: 1; height: 1px; background: var(--border-glass);"></div>
        <span style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;">or</span>
        <div style="flex: 1; height: 1px; background: var(--border-glass);"></div>
      </div>

      <!-- Quick login hints -->
      <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px;">
        <button class="btn btn-outline" style="width: 100%; padding: 10px; font-size: 0.8rem; justify-content: flex-start; gap: 10px;" onclick="document.getElementById('email').value='student@internhub.com'; document.getElementById('password').value='password';">
          <span style="width: 24px; height: 24px; border-radius: 6px; background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.2); display: flex; align-items: center; justify-content: center; font-size: 0.7rem;">🎓</span>
          Fill Student Demo Credentials
        </button>
        <button class="btn btn-outline" style="width: 100%; padding: 10px; font-size: 0.8rem; justify-content: flex-start; gap: 10px;" onclick="document.getElementById('email').value='admin@internhub.com'; document.getElementById('password').value='password';">
          <span style="width: 24px; height: 24px; border-radius: 6px; background: rgba(129,140,248,0.1); border: 1px solid rgba(129,140,248,0.2); display: flex; align-items: center; justify-content: center; font-size: 0.7rem;">🔐</span>
          Fill Admin Demo Credentials
        </button>
      </div>

      <div style="text-align: center; font-size: 0.85rem; color: var(--text-secondary);">
        Don't have an account? <a href="/register.html" style="color: var(--primary); font-weight: 600;">Sign up</a>
      </div>
    </div>

    <!-- Script to handle authentication -->
    <script>
      const form = document.getElementById('login-form');
      const errBox = document.getElementById('error-box');
      const submitBtn = document.getElementById('submit-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errBox.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span style="display:inline-block; animation: spin 0.6s linear infinite; font-size: 1rem;">⟳</span> Signing In...';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          const data = await res.json();
          if (data.success) {
            // Save state
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            // Redirect
            submitBtn.innerHTML = '✓ Authenticated';
            submitBtn.style.background = 'var(--accent)';
            setTimeout(() => { window.location.href = '/dashboard.html'; }, 500);
          } else {
            errBox.innerText = data.message || 'Authentication failed.';
            errBox.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Sign In &rarr;';
          }
        } catch (err) {
          console.error(err);
          errBox.innerText = 'Failed to connect to authentication server.';
          errBox.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Sign In &rarr;';
        }
      });
    </script>

    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </body>
</html>
